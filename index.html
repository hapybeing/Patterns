<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern // Regex Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0A0A0A; font-family: 'JetBrains Mono', monospace; color: #E5E5E5; }
        .command-palette { background: #111111; border: 1px solid #222222; box-shadow: 0 0 20px rgba(138, 43, 226, 0.1); }
        .input-focus:focus { outline: none; border-color: #8A2BE2; box-shadow: 0 0 15px rgba(138, 43, 226, 0.3); }
        .editor-container { position: relative; min-height: 300px; background: #0D0D0D; border: 1px solid #222222; }
        #highlight-layer, #test-input {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            padding: 1.5rem; margin: 0; border: none; font-family: inherit;
            font-size: 1rem; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word;
            overflow-y: auto; background: transparent;
        }
        #test-input { color: transparent; caret-color: #00FFFF; resize: none; z-index: 2; }
        #highlight-layer { color: #888; z-index: 1; pointer-events: none; }
        .regex-match { background: rgba(0, 255, 255, 0.2); border-bottom: 2px solid #00FFFF; border-radius: 2px; }
        .token-card { background: #161616; border-left: 4px solid #8A2BE2; }
        .loading-bar { height: 2px; width: 0%; background: #8A2BE2; transition: width 0.3s ease; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-7xl mx-auto">
        <header class="mb-12 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold tracking-tighter text-white">PATTERN<span class="text-violet-500">.</span></h1>
                <p class="text-zinc-500 text-sm mt-2">REAL-TIME REGEX ENGINE & AI DECOMPILER</p>
            </div>
            <div class="flex gap-4">
                <div class="flex bg-[#111] border border-[#222] rounded-lg p-1">
                    <button onclick="toggleFlag('g')" id="flag-g" class="px-3 py-1 rounded text-xs transition bg-violet-600 text-white">g</button>
                    <button onclick="toggleFlag('i')" id="flag-i" class="px-3 py-1 rounded text-xs transition hover:bg-zinc-800">i</button>
                    <button onclick="toggleFlag('m')" id="flag-m" class="px-3 py-1 rounded text-xs transition hover:bg-zinc-800">m</button>
                </div>
            </div>
        </header>

        <section class="mb-8">
            <div class="command-palette rounded-xl p-2 flex items-center">
                <span class="pl-4 pr-2 text-violet-500 font-bold text-xl">/</span>
                <input type="text" id="regex-input" placeholder="enter_regular_expression_here" 
                       class="w-full bg-transparent p-4 text-xl text-cyan-400 font-medium input-focus rounded-lg">
                <span class="px-4 text-violet-500 font-bold text-xl" id="display-flags">/g</span>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="space-y-4">
                <div class="flex justify-between items-center">
                    <span class="text-xs font-bold text-zinc-500 tracking-widest uppercase">Test Strings</span>
                    <span id="match-count" class="text-xs text-cyan-500">0 matches</span>
                </div>
                <div class="editor-container rounded-xl overflow-hidden">
                    <div id="highlight-layer"></div>
                    <textarea id="test-input" spellcheck="false" placeholder="Paste text here to test matches..."></textarea>
                </div>
            </div>

            <div class="space-y-4">
                <div class="flex justify-between items-center">
                    <span class="text-xs font-bold text-zinc-500 tracking-widest uppercase">Logic Breakdown</span>
                    <button id="decompile-btn" class="bg-violet-600 hover:bg-violet-500 text-white px-4 py-2 rounded-lg text-xs font-bold transition flex items-center gap-2">
                        DECOMPILE LOGIC
                    </button>
                </div>
                <div id="ai-container" class="space-y-4 min-height-[300px]">
                    <div class="loading-bar mb-4" id="progress"></div>
                    <div id="explanation-stack" class="space-y-3">
                        <div class="text-zinc-600 text-sm italic p-8 text-center border border-dashed border-[#222] rounded-xl">
                            Awaiting expression for deconstruction...
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let flags = 'g';
        const regexInput = document.getElementById('regex-input');
        const testInput = document.getElementById('test-input');
        const highlightLayer = document.getElementById('highlight-layer');
        const matchCount = document.getElementById('match-count');
        const decompileBtn = document.getElementById('decompile-btn');
        const explanationStack = document.getElementById('explanation-stack');
        const progress = document.getElementById('progress');

        function toggleFlag(f) {
            if (flags.includes(f)) flags = flags.replace(f, '');
            else flags += f;
            document.querySelectorAll('[id^="flag-"]').forEach(btn => btn.classList.remove('bg-violet-600', 'text-white'));
            [...flags].forEach(f => {
                const btn = document.getElementById(`flag-${f}`);
                if(btn) btn.classList.add('bg-violet-600', 'text-white');
            });
            document.getElementById('display-flags').innerText = `/${flags}`;
            runRegex();
        }

        function runRegex() {
            const pattern = regexInput.value;
            const text = testInput.value;
            if (!pattern) {
                highlightLayer.innerHTML = text;
                matchCount.innerText = '0 matches';
                return;
            }

            try {
                const re = new RegExp(pattern, flags);
                const matches = [...text.matchAll(re)];
                matchCount.innerText = `${matches.length} matches`;
                
                let highlighted = text.replace(re, m => `<span class="regex-match">${m}</span>`);
                highlightLayer.innerHTML = highlighted;
            } catch (e) {
                highlightLayer.innerHTML = text;
                matchCount.innerText = 'Syntax Error';
            }
        }

        async function decompile() {
            const pattern = regexInput.value;
            if(!pattern) return;

            decompileBtn.disabled = true;
            decompileBtn.innerText = "PARSING AST...";
            progress.style.width = "60%";
            explanationStack.innerHTML = '';

            try {
                const response = await fetch('/api/explain', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ regex: pattern })
                });

                const data = await response.json();
                progress.style.width = "100%";
                
                explanationStack.innerHTML = '';
                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'token-card p-4 rounded-r-lg opacity-0';
                    card.innerHTML = `
                        <div class="text-cyan-400 text-xs font-bold mb-1">${item.token}</div>
                        <div class="text-zinc-300 text-sm">${item.explanation}</div>
                    `;
                    explanationStack.appendChild(card);
                });

                gsap.to(".token-card", {
                    opacity: 1,
                    x: 10,
                    stagger: 0.1,
                    duration: 0.5,
                    ease: "power3.out"
                });

            } catch (err) {
                explanationStack.innerHTML = `<div class="text-red-500 border border-red-900/50 p-4 rounded bg-red-950/20 text-xs">AI OFFLINE: Failed to fetch decomposition.</div>`;
            } finally {
                decompileBtn.disabled = false;
                decompileBtn.innerText = "DECOMPILE LOGIC";
                setTimeout(() => progress.style.width = "0%", 1000);
            }
        }

        regexInput.addEventListener('input', runRegex);
        testInput.addEventListener('input', runRegex);
        testInput.addEventListener('scroll', () => {
            highlightLayer.scrollTop = testInput.scrollTop;
        });
        decompileBtn.addEventListener('click', decompile);
    </script>
</body>
</html>
